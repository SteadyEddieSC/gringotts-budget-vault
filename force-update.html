<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gringotts Force Update v2</title><style>body{font-family:system-ui;background:#08111f;color:#f8fafc;margin:0;padding:20px}button,a.btn{display:block;box-sizing:border-box;text-align:center;text-decoration:none;font:inherit;padding:14px 18px;border-radius:14px;border:1px solid #d6a634;background:#13223a;color:#fff;margin:10px 0;width:100%}.danger{background:#4c1020}.card{border:1px solid #334155;border-radius:18px;padding:16px;margin:14px 0;background:#0f1b2f}pre{white-space:pre-wrap;color:#cbd5e1;line-height:1.35}.small{color:#94a3b8;font-size:.95rem}</style></head><body><h1>Gringotts Force Update v2</h1><p>This repairs the app shell only. It does not clear localStorage or delete your vault.</p><div class="card"><h2>Vault check</h2><pre id="status">Checking...</pre><button id="backup">Download best vault backup</button></div><div class="card"><h2>Step 1: reset shell</h2><button id="reset" class="danger">Reset app shell</button><pre id="log">Ready.</pre></div><div class="card"><h2>Step 2: open app</h2><a id="openA" class="btn" href="/index.html?forceUpdate=v2">Open latest app</a><a class="btn" href="/force-update.html?v=2">Reload this force-update page</a><p class="small">Use these links if the reset button does not navigate.</p></div><script>var log=document.getElementById('log');function say(t){log.textContent+=(log.textContent?'\n':'')+t}function vaults(){return Object.keys(localStorage).filter(function(k){return k.indexOf('gringottsBudgetVault.')===0}).map(function(k){try{var raw=localStorage.getItem(k);var obj=JSON.parse(raw);return{key:k,obj:obj,tx:Array.isArray(obj.transactions)?obj.transactions.length:0,raw:raw}}catch(e){return null}}).filter(Boolean).sort(function(a,b){return b.tx-a.tx})}function show(){var v=vaults();var best=v[0];document.getElementById('status').textContent=best?'Best vault: '+best.key+'\nTransactions: '+best.tx+'\nVault keys: '+v.length:'No Gringotts vault found in this browser profile.'}function download(){var best=vaults()[0];if(!best){alert('No vault found');return}var blob=new Blob([JSON.stringify(best.obj,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Gringotts_force_update_backup_'+best.tx+'_transactions_'+new Date().toISOString().replace(/[:.]/g,'-')+'.json';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove()},0)}async function reset(){log.textContent='Starting shell reset...';var next='/index.html?forceUpdate='+Date.now();document.getElementById('openA').href=next;try{if('serviceWorker'in navigator){say('Checking service workers...');var regs=[];if(navigator.serviceWorker.getRegistrations){regs=await navigator.serviceWorker.getRegistrations()}else{var reg=await navigator.serviceWorker.getRegistration();if(reg)regs=[reg]}say('Service workers found: '+regs.length);for(var i=0;i<regs.length;i++){try{await regs[i].unregister();say('Unregistered service worker '+(i+1));}catch(e){say('Service worker unregister failed: '+e.message)}}}else{say('Service worker API not available.')}}catch(e){say('Service worker step failed: '+(e.message||e))}try{if('caches'in window){say('Checking app caches...');var keys=await caches.keys();var n=0;for(var j=0;j<keys.length;j++){if(keys[j].toLowerCase().indexOf('gringotts')>=0){try{await caches.delete(keys[j]);n++;say('Removed cache: '+keys[j]);}catch(e){say('Cache remove failed: '+keys[j])}}}say('Caches removed: '+n)}else{say('Cache API not available.')}}catch(e){say('Cache step failed: '+(e.message||e))}say('Done. Opening latest app...');setTimeout(function(){location.replace(next)},700)}document.getElementById('backup').onclick=download;document.getElementById('reset').onclick=reset;document.getElementById('openA').href='/index.html?forceUpdate='+Date.now();show();</script></body></html>
