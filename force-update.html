<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gringotts Force Update</title><style>body{font-family:system-ui;background:#08111f;color:#f8fafc;margin:0;padding:20px}button{font:inherit;padding:14px 18px;border-radius:14px;border:1px solid #d6a634;background:#13223a;color:#fff;margin:6px 0;width:100%}.danger{background:#4c1020}.card{border:1px solid #334155;border-radius:18px;padding:16px;margin:14px 0;background:#0f1b2f}pre{white-space:pre-wrap;color:#cbd5e1}</style></head><body><h1>Gringotts Force Update</h1><p>This page repairs the app shell only. It does not clear localStorage or delete your vault.</p><div class="card"><h2>Vault check</h2><pre id="status">Checking...</pre><button id="backup">Download best vault backup</button></div><div class="card"><h2>App shell reset</h2><button id="reset" class="danger">Unregister service workers, delete Gringotts caches, reload app</button><button id="open">Open app with cache-busting URL</button></div><script>function vaults(){return Object.keys(localStorage).filter(function(k){return k.indexOf('gringottsBudgetVault.')===0}).map(function(k){try{var raw=localStorage.getItem(k);var obj=JSON.parse(raw);return {key:k,obj:obj,tx:Array.isArray(obj.transactions)?obj.transactions.length:0,raw:raw};}catch(e){return null}}).filter(Boolean).sort(function(a,b){return b.tx-a.tx})}function show(){var v=vaults();var best=v[0];document.getElementById('status').textContent=best?'Best vault: '+best.key+'\nTransactions: '+best.tx+'\nVault keys: '+v.length:'No Gringotts vault found in this browser profile.'}function download(){var best=vaults()[0];if(!best){alert('No vault found');return}var blob=new Blob([JSON.stringify(best.obj,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Gringotts_force_update_backup_'+best.tx+'_transactions_'+new Date().toISOString().replace(/[:.]/g,'-')+'.json';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove()},0)}async function reset(){var regs=[];if('serviceWorker'in navigator){regs=await navigator.serviceWorker.getRegistrations();for(var i=0;i<regs.length;i++){await regs[i].unregister()}}if('caches'in window){var keys=await caches.keys();for(var j=0;j<keys.length;j++){if(keys[j].toLowerCase().indexOf('gringotts')>=0){await caches.delete(keys[j])}}}location.href='/?forceUpdate='+Date.now()}document.getElementById('backup').onclick=download;document.getElementById('reset').onclick=reset;document.getElementById('open').onclick=function(){location.href='/?forceUpdate='+Date.now()};show();</script></body></html>
