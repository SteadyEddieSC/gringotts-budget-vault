version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      playwright:
        patterns:
          - '@playwright/test'
          - 'playwright'
          - 'playwright-core'
    labels:
      - dependencies
      - testing

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - '*'
    labels:
      - dependencies
      - automation
