name: Playwright Regression

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parser-preflight:
    name: Parser and static preflight
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Check release module syntax
        run: |
          node --check src/v115/parser.js
          node --check src/v115/bank-import.js
          node --check src/v115/views.js
          node --check src/v115/reporting.js
          node --check src/v115/release.js
          node --check src/v117/profile-model.js
          node --check src/v117/import-profiles.js
          node --check src/v118/profile-portability-model.js
          node --check src/v118/institution-patterns.js
          node --check src/v118/profile-portability.js
          node --check src/v118/release.js
          node --check src/boot-v118.js
          node --check src/v111/views.js

      - name: Run browser-free parser tests
        shell: bash
        run: npm run test:parser 2>&1 | tee parser-test.log

      - name: Upload parser failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: parser-preflight-${{ github.run_attempt }}
          path: parser-test.log
          if-no-files-found: error
          retention-days: 7

  local-e2e:
    name: Local source — ${{ matrix.shard }}
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    needs: parser-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard:
          - desktop
          - responsive
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Install Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Chromium desktop preflight
        if: matrix.shard == 'desktop'
        run: npx playwright test --grep-invert @live --project=chromium

      - name: Install Firefox and WebKit after Chromium passes
        if: matrix.shard == 'desktop'
        run: npx playwright install --with-deps firefox webkit

      - name: Run Firefox and WebKit desktop gates
        if: matrix.shard == 'desktop'
        run: npx playwright test --grep-invert @live --project=firefox --project=webkit

      - name: Run Android Chromium preflight
        if: matrix.shard == 'responsive'
        run: npx playwright test --grep-invert @live --project=mobile-chromium

      - name: Install WebKit after Android Chromium passes
        if: matrix.shard == 'responsive'
        run: npx playwright install --with-deps webkit

      - name: Run iPad and iPhone WebKit gates
        if: matrix.shard == 'responsive'
        run: npx playwright test --grep-invert @live --project=tablet --project=mobile-webkit

      - name: Upload Playwright failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-${{ matrix.shard }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  live-smoke:
    name: Cloudflare deployment smoke
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: local-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_SKIP_WEBSERVER: '1'
      LIVE_BASE_URL: https://gringotts-budget-vault.pages.dev/?release=playwright-${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Wait for Cloudflare and run smoke test
        shell: bash
        run: |
          for attempt in 1 2 3 4 5 6; do
            echo "Cloudflare smoke attempt ${attempt}/6"
            if npm run test:live; then
              exit 0
            fi
            sleep 30
          done
          exit 1

      - name: Upload deployment failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-live-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
