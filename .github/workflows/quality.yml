name: Accessibility & Quality

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  accessibility-visual:
    name: Accessibility and visual contracts
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        shell: bash
        run: |
          set -o pipefail
          npm ci --ignore-scripts 2>&1 | tee npm-ci.log

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run keyboard and visual contract preflight
        run: npx playwright test --config=playwright.quality.config.js quality-tests/tab-semantics.spec.js quality-tests/visual-contracts.spec.js

      - name: Run axe surface gates
        run: npx playwright test --config=playwright.quality.config.js quality-tests/accessibility.spec.js quality-tests/v120-accessibility.spec.js quality-tests/v121-accessibility.spec.js quality-tests/v122-accessibility.spec.js

      - name: Upload quality failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: accessibility-visual-${{ github.run_attempt }}
          path: |
            npm-ci.log
            quality-report/
            quality-results/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  lighthouse:
    name: Lighthouse CI budgets
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Start local static server
        shell: bash
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/gringotts-lighthouse-server.log 2>&1 &
          for attempt in 1 2 3 4 5 6; do
            if curl --fail --silent http://127.0.0.1:4173/?quality=lighthouse > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/gringotts-lighthouse-server.log
          exit 1

      - name: Verify exact Lighthouse CI version
        run: npm exec --yes --package=@lhci/cli@0.15.1 -- lhci --version

      - name: Run local Lighthouse CI assertions
        run: npm exec --yes --package=@lhci/cli@0.15.1 -- lhci autorun --config=lighthouserc.cjs

      - name: Upload Lighthouse failure reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-reports-${{ github.run_attempt }}
          path: |
            lighthouse-reports/
            /tmp/gringotts-lighthouse-server.log
          if-no-files-found: ignore
          retention-days: 14
