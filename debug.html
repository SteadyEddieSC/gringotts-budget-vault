<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gringotts Debug</title><style>body{font-family:system-ui;background:#08111f;color:#f8fafc;margin:0;padding:20px}button,a{display:block;box-sizing:border-box;text-align:center;text-decoration:none;font:inherit;padding:14px 18px;border-radius:14px;border:1px solid #d6a634;background:#13223a;color:#fff;margin:10px 0;width:100%}.card{border:1px solid #334155;border-radius:18px;padding:16px;margin:14px 0;background:#0f1b2f}pre{white-space:pre-wrap;color:#cbd5e1;line-height:1.35;max-height:55vh;overflow:auto}</style></head><body><h1>Gringotts Debug</h1><p>Copies safe diagnostics only: version, vault counts, keys, caches, service workers, loaded scripts, and errors. It does not include transaction rows.</p><div class="card"><button id="copy">Copy debug report</button><button id="refresh">Refresh report</button><a href="/index.html?debugOpen=1">Open app</a><pre id="out">Loading...</pre></div><script>async function report(){var vaults=Object.keys(localStorage).filter(k=>k.indexOf('gringottsBudgetVault.')===0).map(k=>{try{var raw=localStorage.getItem(k)||'';var obj=JSON.parse(raw);return{key:k,bytes:raw.length,transactions:Array.isArray(obj.transactions)?obj.transactions.length:0,rules:Array.isArray(obj.rules)?obj.rules.length:0,version:obj.version||'',lastSavedAt:obj.lastSavedAt||obj.createdAt||''}}catch(e){return{key:k,error:e.message}}}).sort((a,b)=>(b.transactions||0)-(a.transactions||0));var caches=[];var sw=[];try{if('caches'in window)caches=await window.caches.keys()}catch(e){caches=['error '+e.message]}try{if('serviceWorker'in navigator)sw=(await navigator.serviceWorker.getRegistrations()).map(r=>({scope:r.scope,active:r.active&&{scriptURL:r.active.scriptURL,state:r.active.state},waiting:r.waiting&&{scriptURL:r.waiting.scriptURL,state:r.waiting.state}}))}catch(e){sw=[{error:e.message}]}return{debugVersion:'standalone-v87',time:new Date().toISOString(),url:location.href,userAgent:navigator.userAgent,viewport:{w:innerWidth,h:innerHeight,dpr:devicePixelRatio},vaults:vaults,localStorageKeys:Object.keys(localStorage).filter(k=>k.indexOf('gringotts')===0).sort(),cacheNames:caches,serviceWorkers:sw,controller:navigator.serviceWorker&&navigator.serviceWorker.controller?{scriptURL:navigator.serviceWorker.controller.scriptURL,state:navigator.serviceWorker.controller.state}:null}}async function draw(){document.getElementById('out').textContent=JSON.stringify(await report(),null,2)}async function copy(){var t=JSON.stringify(await report(),null,2);try{await navigator.clipboard.writeText(t);alert('Debug report copied')}catch(e){document.getElementById('out').textContent=t;alert('Copy failed; long-press/select the report text.')}}document.getElementById('copy').onclick=copy;document.getElementById('refresh').onclick=draw;draw()</script></body></html>
